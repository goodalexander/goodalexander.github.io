baseURL = 'https://goodalexander.com'
languageCode = 'en-us'
title = 'goodalexander'
theme = 'PaperMod'

enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true
# googleAnalytics = "UA-123-45"

[minify]
disableXML = true
# minifyOutput = true

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    [languages.en.taxonomies]
      category = "categories"
      tag = "tags"
      series = "series"
    [[languages.en.menu.main]]
      name = "The Merge"
      url = "the-merge/"
      weight = 5
    [[languages.en.menu.main]]
      name = "Join Task Node"
      url = "https://tasknode.postfiat.org/"
      weight = 6
    [[languages.en.menu.main]]
      name = "Tags"
      url = "tags/"
      weight = 10
    [[languages.en.menu.main]]
      name = "Trading"
      url = "trading/"
      weight = 20
    [[languages.en.menu.main]]
      name = "Search"
      url = "search/"
      weight = 30
    [[languages.en.menu.main]]
      name = "Archive"
      url = "archives"
      weight = 40
    [[languages.en.menu.main]]
      name = "Subscribe"
      url = "subscribe/"
      weight = 50
      
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "goodalexander: navigating a post fiat future. Philosophy, rants, interactive art, and trading ideas informed by the Post Fiat data lake."
  author = "goodalexander"
  # author = ["Me", "You"]
  defaultTheme = "auto"
  # disableThemeToggle = true
  ShowShareButtons = true
  ShowReadingTime = true
  # disableSpecial1stPost = true
  displayFullLangName = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  # comments = false
  images = ["papermod-cover.png"]
  [markup.goldmark.renderer]
    unsafe = true


[params.homeInfoParams]
  Title = "goodalexander: navigating a post fiat future"
  Content = '''Philosophy, rants, interactive art, and trading ideas informed by the Post Fiat data lake. [Join the Task Node](https://tasknode.postfiat.org/) to learn more. Always free. Never financial advice. Please read [Disclaimer](https://goodalexander.com/disclaimer/).'''
  
  [[params.socialIcons]]
    name = "twitter"
    title = "Follow me on twitter"
    url = "https://www.twitter.com/goodalexander"
  
  [[params.socialIcons]]
    name = "Discord"
    title = "Join discord community"
    url = "https://discord.gg/U6HjgDSmhR"
  
  [[params.socialIcons]]
    name = "github"
    title = "My Github"
    url = "https://www.github.com/goodalexander"

  [[params.socialIcons]]
    name = "email"
    title = "email newsletter"
    url = "https://goodalexander.com/subscribe/"

#  [params.editPost]
#    URL = "https://github.com/adityatelange/hugo-PaperMod/tree/exampleSite/content"
#    Text = "Suggest Changes"
#    appendFilePath = true

  # [params.label]
  #   text = "Home"
  #   icon = "icon.png"
  #   iconHeight = 35

  # [params.analytics]
  #   [params.analytics.google]
  #     SiteVerificationTag = "XYZabc"

  [params.assets]
    disableHLJS = true
    favicon = "/favicon.ico?v=ga-favicon-v2"
    favicon16x16 = "/favicon-16x16.png?v=ga-favicon-v2"
    favicon32x32 = "/favicon-32x32.png?v=ga-favicon-v2"
    apple_touch_icon = "/apple-touch-icon.png?v=ga-favicon-v2"
    safari_pinned_tab = "/safari-pinned-tab.svg?v=ga-favicon-v2"
    theme_color = "#070a0d"
    msapplication_TileColor = "#070a0d"
