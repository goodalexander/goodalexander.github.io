baseURL = 'https://goodalexander.com'
languageCode = 'en-us'
title = 'goodalexander'
theme = 'PaperMod'

enableInlineShortcodes = true
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false
enableEmoji = true
pygmentsUseClasses = true
# googleAnalytics = "UA-123-45"

[minify]
disableXML = true
# minifyOutput = true

[languages]
  [languages.en]
    languageName = "English"
    weight = 1
    [languages.en.taxonomies]
      category = "categories"
      tag = "tags"
      series = "series"
    [[languages.en.menu.main]]
      name = "Search"
      url = "search/"
      weight = 30
    [[languages.en.menu.main]]
      name = "Archive"
      url = "archives"
      weight = 40
      
[outputs]
  home = ["HTML", "RSS", "JSON"]

[params]
  env = "production"
  description = "goodalexander: philosophy, rants, interactive art, and trading ideas."
  author = "goodalexander"
  # author = ["Me", "You"]
  defaultTheme = "dark"
  # disableThemeToggle = true
  ShowShareButtons = true
  ShowReadingTime = true
  # disableSpecial1stPost = true
  displayFullLangName = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowRssButtonInSectionTermList = true
  ShowToc = true
  # comments = false
  images = ["papermod-cover.png"]
  [markup.goldmark.renderer]
    unsafe = true


[params.homeInfoParams]
  Title = "goodalexander"
  Content = '''Philosophy, rants, interactive art, and trading ideas. Always free. Never financial advice.'''

  [[params.homeCtas]]
    title = "Follow on X (Goodalexander)"
    description = "Long-form notes, market thoughts, and live build updates."
    url = "https://x.com/goodalexander"

  [[params.socialIcons]]
    name = "twitter"
    title = "Follow me on twitter"
    url = "https://www.twitter.com/goodalexander"
  
  [[params.socialIcons]]
    name = "github"
    title = "My Github"
    url = "https://www.github.com/goodalexander"

#  [params.editPost]
#    URL = "https://github.com/adityatelange/hugo-PaperMod/tree/exampleSite/content"
#    Text = "Suggest Changes"
#    appendFilePath = true

  # [params.label]
  #   text = "Home"
  #   icon = "icon.png"
  #   iconHeight = 35

  # [params.analytics]
  #   [params.analytics.google]
  #     SiteVerificationTag = "XYZabc"

  [params.assets]
    disableHLJS = true
    favicon = "/favicon.ico?v=ga-favicon-v2"
    favicon16x16 = "/favicon-16x16.png?v=ga-favicon-v2"
    favicon32x32 = "/favicon-32x32.png?v=ga-favicon-v2"
    apple_touch_icon = "/apple-touch-icon.png?v=ga-favicon-v2"
    safari_pinned_tab = "/safari-pinned-tab.svg?v=ga-favicon-v2"
    theme_color = "#070a0d"
    msapplication_TileColor = "#070a0d"
